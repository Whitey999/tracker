name: Daily Gold Data Collection

on:
  schedule:
    # Runs at 02:30 UTC = 09:00 Myanmar time (UTC+6:30), every day
    - cron: "30 2 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

permissions:
  contents: write   # needed so the workflow can commit gold_history.csv back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run data collector
        run: python gold_data_collector.py

      - name: Install forecast dependencies
        run: pip install pandas statsmodels scikit-learn

      - name: Run SARIMA forecast model
        run: python train_forecast_model.py
        continue-on-error: true   # don't block the data commit if a model has an off day

      - name: Run scikit-learn forecast + backtest comparison
        run: python train_forecast_sklearn.py
        continue-on-error: true

      - name: Commit and push updated data
        run: |
          git config user.name "gold-data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add gold_history.csv forecast.json forecast_sklearn.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Daily gold data + forecast update ($(date -u +%Y-%m-%d))"
          git push
